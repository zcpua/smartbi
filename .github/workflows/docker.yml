name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runtime: node
            dockerfile: Dockerfile
            tag-suffix: ""
          - runtime: bun
            dockerfile: Dockerfile.bun
            tag-suffix: "-bun"
          - runtime: deno
            dockerfile: Dockerfile.deno
            tag-suffix: "-deno"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.tag-suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag-suffix }}
            type=raw,value=latest,enable=${{ matrix.runtime == 'node' }}
            type=raw,value=${{ matrix.runtime }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
